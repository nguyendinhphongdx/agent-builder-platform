version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentbuilder-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentbuilder} -d ${POSTGRES_DB:-agentbuilder}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agentbuilder-network

volumes:
  postgres_data:
    driver: local

networks:
  agentbuilder-network:
    external: true
